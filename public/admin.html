<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Site content · ArtPro Admin</title>
<link rel="icon" href="assets/images/favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#b8912f; --gold-deep:#8a6d1f; --ink:#211d18; --paper:#f4f0e7; --surface:#fbf9f4; --border:#e4ddcf; --muted:#8c8578; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font-family:"Montserrat",system-ui,sans-serif; color:var(--ink); background:var(--paper); }
  a{ color:var(--gold-deep); }
  .app{ display:flex; min-height:100vh; }

  /* sidebar */
  .side{ width:266px; flex:0 0 266px; background:#211d18; color:#e9e3d6; display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh; overflow-y:auto; }
  .side__brand{ padding:20px 22px 14px; font-family:"Barlow Condensed",sans-serif; font-weight:700;
    text-transform:uppercase; letter-spacing:.14em; font-size:19px; }
  .side__brand b{ color:var(--gold); }
  .side__brand small{ display:block; letter-spacing:.18em; font-size:10px; color:#b8b0a2; margin-top:3px; font-weight:600; }
  .side__group{ padding:14px 22px 4px; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:#8c8578; font-weight:600; }
  .side__item{ display:block; width:100%; text-align:left; border:0; background:none; color:#d8d2c6; cursor:pointer;
    font:inherit; font-size:14px; padding:9px 22px; border-left:3px solid transparent; }
  .side__item:hover{ background:#2b261f; color:#fff; }
  .side__item.active{ background:#2b261f; color:#fff; border-left-color:var(--gold); font-weight:600; }
  .side__foot{ margin-top:auto; padding:16px 22px; border-top:1px solid #342f27; font-size:12.5px; }
  .side__foot a{ color:#cbb892; text-decoration:none; display:block; padding:4px 0; }
  .side__foot a:hover{ color:#fff; }

  /* main */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{ position:sticky; top:0; z-index:5; background:rgba(244,240,231,.92); backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border); padding:16px clamp(20px,4vw,44px); display:flex; align-items:center; gap:16px; }
  .topbar h1{ margin:0; font-family:"Barlow Condensed",sans-serif; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; font-size:26px; }
  .topbar .desc{ color:var(--muted); font-size:13px; }
  .topbar .spacer{ flex:1; }
  .save{ border:0; background:var(--gold); color:#241d10; font:inherit; font-weight:700; text-transform:uppercase;
    letter-spacing:.06em; font-size:13px; padding:12px 26px; border-radius:9px; cursor:pointer; }
  .save:disabled{ opacity:.5; cursor:default; }
  .save:hover:not(:disabled){ background:#cfa63c; }
  .status{ font-size:13px; color:var(--muted); min-width:90px; }
  .status.ok{ color:#3c7a45; font-weight:600; } .status.err{ color:#a5382f; font-weight:600; }

  .panel{ padding:clamp(22px,4vw,44px); max-width:820px; }
  .field{ margin-bottom:26px; }
  .fhead{ font-family:"Barlow Condensed",sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    font-size:17px; color:var(--gold-deep); margin:34px 0 16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .fhead:first-child{ margin-top:4px; }
  .fsub{ font-weight:600; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted);
    margin:22px 0 14px; padding-bottom:6px; border-bottom:1px dashed var(--border); }
  .field > label{ display:block; font-weight:600; font-size:14px; margin-bottom:7px; }
  .field .hint{ color:var(--muted); font-size:12px; margin:-3px 0 8px; }
  .field input, .field textarea{ width:100%; font:inherit; font-size:14.5px; color:var(--ink);
    background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:11px 13px; }
  .field textarea{ min-height:96px; resize:vertical; line-height:1.55; }
  .field input:focus, .field textarea:focus{ outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(184,145,47,.15); }
  .imgrow{ display:flex; gap:16px; align-items:flex-start; }
  .imgrow .prev{ width:150px; height:96px; flex:0 0 150px; border:1px solid var(--border); border-radius:8px;
    background:#efe9dd center/cover no-repeat; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:11px; overflow:hidden; }
  .imgrow .prev img{ width:100%; height:100%; object-fit:cover; }
  .file{ font-size:13px; }
  .note{ background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px 20px; color:#57514a; font-size:13.5px; line-height:1.6; }
  .note b{ color:var(--ink); }
  .btn2{ display:inline-block; border:1px solid var(--gold); color:var(--gold-deep); background:none; font:inherit;
    font-weight:600; font-size:13px; padding:10px 18px; border-radius:8px; cursor:pointer; text-decoration:none; }
  .btn2:hover{ background:var(--gold); color:#241d10; }
  .load{ padding:60px; text-align:center; color:var(--muted); }
  /* gallery photo manager */
  .pgrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:12px; margin:4px 0 18px; }
  .pcell{ position:relative; aspect-ratio:4/3; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#efe9dd; }
  .pcell img{ width:100%; height:100%; object-fit:cover; display:block; }
  .pcell .num{ position:absolute; left:6px; bottom:6px; background:rgba(33,29,24,.78); color:#fff; font-size:11px; font-weight:600; padding:2px 7px; border-radius:20px; }
  .pcell .hero{ background:var(--gold); color:#241d10; }
  .pcell .del{ position:absolute; top:6px; right:6px; width:26px; height:26px; border:0; border-radius:50%;
    background:rgba(33,29,24,.72); color:#fff; font-size:15px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .pcell .del:hover{ background:#a5382f; }
  .padd{ display:flex; align-items:center; justify-content:center; aspect-ratio:4/3; border:1.5px dashed var(--gold);
    border-radius:8px; color:var(--gold-deep); background:none; font:inherit; font-weight:600; font-size:13px; cursor:pointer; text-align:center; padding:8px; }
  .padd:hover{ background:rgba(184,145,47,.08); }
  .pempty{ color:var(--muted); font-size:13px; margin:4px 0 14px; }
  /* item manager (photo + description per item) */
  .igrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:14px; margin:4px 0 18px; }
  .icell{ border:1px solid var(--border); border-radius:9px; overflow:hidden; background:var(--surface); display:flex; flex-direction:column; }
  .icell .ithumb{ position:relative; aspect-ratio:4/3; background:#efe9dd; }
  .icell .ithumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .icell .del{ position:absolute; top:6px; right:6px; width:26px; height:26px; border:0; border-radius:50%; background:rgba(33,29,24,.72); color:#fff; font-size:15px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .icell .del:hover{ background:#a5382f; }
  .icell textarea{ border:0; border-top:1px solid var(--border); background:none; font:inherit; font-size:13px; padding:9px 10px; min-height:58px; resize:vertical; line-height:1.5; width:100%; }
  .icell textarea:focus{ outline:none; box-shadow:inset 0 0 0 2px rgba(184,145,47,.22); }
  .iadd{ display:flex; align-items:center; justify-content:center; aspect-ratio:4/3; border:1.5px dashed var(--gold); border-radius:9px; color:var(--gold-deep); background:none; font:inherit; font-weight:600; font-size:13px; cursor:pointer; text-align:center; padding:8px; }
  .iadd:hover{ background:rgba(184,145,47,.08); }
  .iempty{ color:var(--muted); font-size:13px; margin:4px 0 12px; }
  @media (max-width:760px){ .app{ flex-direction:column; } .side{ width:100%; height:auto; position:static; flex-basis:auto; } }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side__brand"><b>ArtPro</b> Admin<small>Site content</small></div>
    <nav id="nav"></nav>
    <div class="side__foot">
      <a href="catalog.html">→ Art catalogue</a>
      <a href="manage-artists.html">→ Manage artists</a>
      <a href="index.html" target="_blank">→ View the site</a>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div><h1 id="ptitle">Loading…</h1><div class="desc" id="pdesc"></div></div>
      <div class="spacer"></div>
      <span class="status" id="status"></span>
      <button class="save" id="save" disabled>Save changes</button>
    </div>
    <div id="panel" class="load">Loading site content…</div>
  </main>
</div>

<script>
// ---------- services on the Services page ----------
// [id, default name, default link, default shipped image]
const CORE_SERVICES = [
  ['framing',    'Framing',    'framing.html',              'assets/images/services/framing.jpg'],
  ['commission', 'Commission', 'commission.html',           'assets/images/services/commission.jpg'],
  ['valuations', 'Valuations', 'valuations.html',           'assets/images/services/valuations.jpg'],
  ['hanging',    'Hanging',    'hanging-of-paintings.html', 'assets/images/services/hanging-of-paintings.jpg'],
  ['delivery',   'Delivery',   'delivery.html',             'assets/images/services/delivery.jpg'],
  ['auctions',   'Auctions',   'auctions.html',             'assets/images/services/auctions.jpg'],
];
// Build the editable fields for ONE service (the panel title carries its name):
// the card fields, then the fields for the detail page it links to.
function svcFields(s){
  return [
    { type:'subhead', label:'Card (on the Services page)' },
    { key:'svc.'+s[0]+'.name',    label:'Name',    type:'text', ph:s[1] },
    { key:'svc.'+s[0]+'.summary', label:'Summary', type:'textarea', ph:'Short one-line description shown on the card.' },
    { key:'svc.'+s[0]+'.image',   label:'Image',   type:'image', media:'svc-'+s[0], def:s[3], hint:'Shown on the card and at the top of the detail page.' },
    { key:'svc.'+s[0]+'.link',    label:'Links to (page or URL)', type:'text', ph:s[2], hint:'The detail page ('+s[2]+'), or an external URL like https://framing.co.za.' },
    { type:'subhead', label:'Detail page ('+s[2]+')' },
    { key:'svc.'+s[0]+'.headline', label:'Headline', type:'text' },
    { key:'svc.'+s[0]+'.sub',      label:'Sub-line (under the headline)', type:'text' },
    { key:'svc.'+s[0]+'.body',     label:'Body copy', type:'textarea', hint:'Leave a blank line between paragraphs. Leave empty to keep the current text.' },
    { key:'svc.'+s[0]+'.points',   label:'Bullet points', type:'textarea', hint:'One per line. Leave empty to keep the current list.' },
    { key:'svc.'+s[0]+'.cta',      label:'Button label', type:'text' },
  ];
}

// ---------- editable content structure ----------
const SCHEMA = [
  { group:'Site-wide', panels:[
    { id:'contact', title:'Contact details', desc:'Phone, email, WhatsApp, trading hours and social links. These appear on the Contact page, and the phone/email/social also show in the footer of every page - change them here and they update everywhere.', fields:[
      { key:'contact.phone',    label:'Phone number', type:'tel',   ph:'+27 82 555 4272' },
      { key:'contact.email',    label:'Primary email', type:'email', ph:'lee@artprogallery.co.za' },
      { key:'contact.email2',   label:'Second email',  type:'email', ph:'admin@artprogallery.co.za' },
      { key:'contact.whatsapp', label:'WhatsApp number', type:'tel', ph:'+27 82 555 4272', hint:'Becomes a tap-to-chat link on the Contact page. Leave empty to show "Number needed".' },
      { key:'contact.hours',    label:'Trading hours', type:'textarea', ph:'Mon-Fri 9am-5pm\nSat 9am-1pm', hint:'One line per row. Leave empty to show the placeholder.' },
      { type:'subhead', label:'Social links' },
      { key:'social.facebook',  label:'Facebook URL', type:'text', ph:'https://web.facebook.com/ArtProGalleries' },
      { key:'social.instagram', label:'Instagram URL', type:'text', ph:'https://www.instagram.com/artprogallery/' },
      { key:'social.youtube',   label:'YouTube URL', type:'text', ph:'https://www.youtube.com/@ArtProGallery' },
    ]},
    { id:'footer', title:'Footer', desc:'The short blurb and the newsletter line in the dark footer strip at the bottom of every page.', fields:[
      { key:'footer.blurb',      label:'Footer blurb (under the ArtPro name)', type:'textarea', ph:'South African art across four galleries…' },
      { key:'footer.newsletter', label:'Newsletter line', type:'text' },
    ]},
  ]},
  { group:'Home page', panels:[
    { id:'home-hero', title:'Hero (top banner)', desc:'Homepage - the large banner at the very top: the small kicker line, the big headline, the intro paragraph, and the main image with its caption.', fields:[
      { key:'home.hero.kicker',   label:'Kicker (small line above the headline)', type:'text' },
      { key:'home.hero.headline', label:'Headline', type:'textarea', hint:'Each new line becomes a line break.' },
      { key:'home.hero.lead',     label:'Lead paragraph', type:'textarea' },
      { key:'home.hero.image',    label:'Hero image', type:'image', media:'home-hero' },
      { key:'home.hero.figcap',   label:'Image caption', type:'text' },
    ]},
    { id:'home-intro', title:'Intro block', desc:'Homepage - the short introduction block directly below the hero banner.', fields:[
      { key:'home.intro.eyebrow', label:'Eyebrow (small line above)', type:'text' },
      { key:'home.intro.lead',    label:'Lead paragraph', type:'textarea' },
      { key:'home.intro.muted',   label:'Second paragraph', type:'textarea' },
    ]},
  ]},
  { group:'About page', panels:[
    { id:'about-intro', title:'Intro', desc:'About page - the title and one-line summary at the very top of the page.', fields:[
      { key:'about.headline', label:'Headline', type:'text', ph:'A gallery grown across the city' },
      { key:'about.lead',     label:'Sub-line (under the headline)', type:'textarea', ph:'From a humble start to four galleries…' },
    ]},
    { id:'about-story', title:'Our story', desc:'About page - the main story text and the photo beside it (the first block under the title).', fields:[
      { key:'about.story.lead', label:'Opening line (shown larger)', type:'textarea', hint:'Leave empty to keep the current text.' },
      { key:'about.story.body', label:'Story paragraphs', type:'textarea', hint:'Leave a blank line between paragraphs. Leave empty to keep the current text.' },
      { key:'about.image',      label:'Photo', type:'image', media:'about-story', def:'assets/images/img-vintage-carscene.jpg' },
      { key:'about.imagecaption', label:'Photo caption', type:'text' },
    ]},
    { id:'about-quote', title:'Pull quote', desc:'About page - the large highlighted quote band across the middle of the page.', fields:[
      { key:'about.pullquote', label:'Quote', type:'textarea', hint:'Leave empty to keep the current text.' },
    ]},
    { id:'about-offer', title:'“More than paintings” cards', desc:'About page - the three cards under the “More than paintings” heading.', fields:[
      { key:'about.offer.kicker',  label:'Small line above the heading', type:'text', ph:'Under one roof' },
      { key:'about.offer.heading', label:'Section heading', type:'text', ph:'More than paintings' },
      { type:'subhead', label:'Card 1' },
      { key:'about.offer.1.label', label:'Tag', type:'text', ph:'Fine art' },
      { key:'about.offer.1.name',  label:'Title', type:'text', ph:'Masterpieces' },
      { key:'about.offer.1.desc',  label:'Description', type:'textarea' },
      { type:'subhead', label:'Card 2' },
      { key:'about.offer.2.label', label:'Tag', type:'text', ph:'Interiors' },
      { key:'about.offer.2.name',  label:'Title', type:'text', ph:'Decorative design' },
      { key:'about.offer.2.desc',  label:'Description', type:'textarea' },
      { type:'subhead', label:'Card 3' },
      { key:'about.offer.3.label', label:'Tag', type:'text', ph:'Support' },
      { key:'about.offer.3.name',  label:'Title', type:'text', ph:'Services' },
      { key:'about.offer.3.desc',  label:'Description', type:'textarea' },
    ]},
    { id:'about-owner', title:'The owner', desc:'About page - the “Who you’ll meet” section at the bottom: the owner’s photo, name, role and biography.', fields:[
      { key:'about.people.kicker',  label:'Small line above the heading', type:'text', ph:'The people' },
      { key:'about.people.heading', label:'Section heading', type:'text', ph:"Who you'll meet" },
      { type:'subhead', label:'Owner' },
      { key:'about.person.image',   label:'Photo', type:'image', media:'about-person', hint:'A portrait replaces the “LH” placeholder box.' },
      { key:'about.person.role',    label:'Role', type:'text', ph:'Owner & proprietor' },
      { key:'about.person.name',    label:'Name', type:'text', ph:'Lee Holloway' },
      { key:'about.person.tagline', label:'One line under the name', type:'text', ph:'Founder of ArtPro Gallery.' },
      { key:'about.person.bio',     label:'Biography', type:'textarea', hint:'A few sentences. Leave a blank line between paragraphs. Leave empty to keep the current placeholder.' },
    ]},
  ]},
  { group:'Contact page', panels:[
    { id:'contact-page', title:'Page text', desc:'Contact page - the page title, the intro line, and the short text above the enquiry form. (Phone and emails are under “Contact details”.)', fields:[
      { key:'contactpage.headline',  label:'Headline', type:'text' },
      { key:'contactpage.lead',      label:'Sub-line (under the headline)', type:'textarea' },
      { key:'contactpage.formintro', label:'Text above the enquiry form', type:'textarea' },
    ]},
  ]},
  { group:'Services page', panels:[
    { id:'services-intro', title:'Page intro', desc:'Services page - the title and lead paragraph at the very top.', fields:[
      { key:'services.headline', label:'Headline', type:'text' },
      { key:'services.lead',     label:'Lead paragraph', type:'textarea' },
    ]},
  ].concat(CORE_SERVICES.map(function(s){ return {
      id:'svc-'+s[0], title:s[1],
      desc:'Services page - the “'+s[1]+'” card (Around your collection) and the detail page it links to ('+s[2]+').',
      fields: svcFields(s)
  }; })) },
  { group:'Furniture shop', panels:[
    { id:'furniture', title:'Shop & location', desc:'The furniture shop next to Maggies Farm: its card on the Services page, the Furniture page intro, and its listing under “Where to find us” on the homepage & Contact page. (Edit the Statues / Carpets / Lamps categories in their own screens below.)', fields:[
      { type:'subhead', label:'Card (on the Services page)' },
      { key:'furniture.name',    label:'Name', type:'text', ph:'Furniture' },
      { key:'furniture.summary', label:'Summary', type:'textarea', ph:'Furniture, statues, carpets and lamps - our shop next to Maggies Farm.' },
      { key:'furniture.image',   label:'Image', type:'image', media:'furniture', def:'assets/images/services/statues.jpg', hint:'Shown on the Services-page card. Upload a photo of the shop when you have one.' },
      { key:'furniture.link',    label:'Links to (page or URL)', type:'text', ph:'furniture.html' },
      { type:'subhead', label:'Furniture page intro' },
      { key:'furniture.headline', label:'Headline', type:'text', ph:'The furniture shop' },
      { key:'furniture.sub',      label:'Sub-line (under the headline)', type:'text' },
      { key:'furniture.body',     label:'Intro paragraph', type:'textarea', hint:'Leave a blank line between paragraphs. Leave empty to keep the current text.' },
      { key:'furniture.cta',      label:'Button label', type:'text', ph:'Get directions' },
      { type:'subhead', label:'Location (Where to find us)' },
      { key:'furniture.area',    label:'Area line (small, above name)', type:'text', ph:'05 - Lanseria' },
      { key:'furniture.address', label:'Address', type:'textarea', hint:'Each new line becomes a line break.' },
      { key:'furniture.map',     label:'Google Maps link', type:'text', hint:'Powers the “Open in Maps” / “Get directions” buttons. Paste the share link from Google Maps.' },
      { key:'furniture.tag',     label:'Tag (small badge)', type:'text', ph:'Furniture shop' },
    ]},
  ].concat(['statues','carpets','lamps'].map(function(c){
    var cap = c.charAt(0).toUpperCase() + c.slice(1);
    return { id:'furn-'+c, title:cap, desc:'Furniture shop - the “'+cap+'” category. The heading image & summary show on the shop page, the homepage strip and Contact. The items below are what visitors see when they click '+cap+' - add a photo and description for each piece.', fields:[
      { type:'subhead', label:'Category heading' },
      { key:'furniture.'+c+'.title', label:'Title', type:'text', ph:cap },
      { key:'furniture.'+c+'.desc',  label:'Short description', type:'textarea' },
      { key:'furniture.'+c+'.image', label:'Heading image', type:'image', media:'furn-'+c, def:'assets/images/services/'+c+'.jpg', hint:'Shown on the shop page, the homepage strip and Contact.' },
      { type:'subhead', label:'Items - what the store carries' },
      { key:'furniture.'+c+'.items', label:'', type:'items', hint:'Add a photo and a short description for each piece. These show when someone clicks '+cap+'. Drag the bottom of a box to resize the description.' },
    ] };
  })) },
  { group:'Galleries', panels: [
    ['sunninghill','Sunninghill Village'], ['prison','Prison Break Market'],
    ['lifestyle','ArtPro @ Lifestyle'], ['maggies','Maggies Farm']
  ].map(function(g){ return {
    id:'g-'+g[0], title:g[1], desc:'This gallery’s card on the homepage “Four galleries” grid, and the top + photo strip of its own gallery page.', fields:[
      { key:'gallery.'+g[0]+'.area',    label:'Area line (small, above name)', type:'text' },
      { key:'gallery.'+g[0]+'.name',    label:'Gallery name', type:'text' },
      { key:'gallery.'+g[0]+'.address', label:'Address', type:'textarea', hint:'Each new line becomes a line break. Shows on the homepage, the Contact page and the gallery page.' },
      { key:'gallery.'+g[0]+'.map',     label:'Google Maps link', type:'text', hint:'Paste the share link from Google Maps. Powers the “Get directions” / “Open in Maps” buttons. If a gallery moves, update this. Leave empty to keep the current one.' },
      { key:'gallery.'+g[0]+'.tag',     label:'Tag (small badge)', type:'text' },
      { key:'gallery.'+g[0]+'.photos',  label:'Gallery photos', type:'photos', gallery:g[0],
        hint:'Photos of the physical gallery, shown on its page. Add or remove - the first one is the large hero.' },
    ] };
  })},
  { group:'Tools', panels:[
    { id:'payments', title:'Payments (PayPal)', desc:'Switch on card / PayPal checkout for agreed sales, and see recent orders. The buyer page is at /pay.', special:'payments' },
    { id:'backup', title:'Backup & export', desc:'Download a full copy of your data.', special:'backup' },
  ]},
];

const PANELS = {}; SCHEMA.forEach(function(g){ g.panels.forEach(function(p){ PANELS[p.id]=p; }); });

// Starting photo set for each gallery when nothing has been saved yet - the
// files already shipped in assets/images/galleries/<slug>/. Once saved (or
// edited), the DB list takes over. Keeps existing photos deletable from here.
const DEFAULT_PHOTOS = {
  sunninghill: [], prison: [], lifestyle: [],
  maggies: [
    'assets/images/galleries/maggies-farm/01.jpg','assets/images/galleries/maggies-farm/02.jpg',
    'assets/images/galleries/maggies-farm/03.jpg','assets/images/galleries/maggies-farm/04.jpg',
    'assets/images/galleries/maggies-farm/05.jpg','assets/images/galleries/maggies-farm/06.jpg',
    'assets/images/galleries/maggies-farm/07.jpg','assets/images/galleries/maggies-farm/08.jpg',
    'assets/images/galleries/maggies-farm/09.jpg','assets/images/galleries/maggies-farm/10.jpg',
    'assets/images/galleries/maggies-farm/11.jpg','assets/images/galleries/maggies-farm/12.jpg',
    'assets/images/galleries/maggies-farm/13.jpg','assets/images/galleries/maggies-farm/14.jpg',
    'assets/images/galleries/maggies-farm/15.jpg','assets/images/galleries/maggies-farm/16.jpg',
    'assets/images/galleries/maggies-farm/17.jpg'
  ]
};

const $ = function(s){ return document.querySelector(s); };
let CONTENT = {};          // live values from the DB
let current = null;        // current panel id
let dirty = {};            // pending text changes {key:value}
let pendingImages = {};    // {mediaKey: dataURL}
let galPhotos = null;      // active photos field: { key, gallery, list:[urls] }
let galItems = null;       // active items field: { key, list:[{url,desc}] }

// ---------- sidebar ----------
(function buildNav(){
  var nav = $('#nav'), html = '';
  SCHEMA.forEach(function(g){
    html += '<div class="side__group">'+g.group+'</div>';
    g.panels.forEach(function(p){ html += '<button class="side__item" data-panel="'+p.id+'">'+p.title.replace(/^.*· /,'')+'</button>'; });
  });
  nav.innerHTML = html;
  nav.addEventListener('click', function(e){ var b=e.target.closest('[data-panel]'); if(b) show(b.dataset.panel); });
})();

// ---------- load content ----------
fetch('/api/public/content', { cache:'no-store' })
  .then(function(r){ return r.ok ? r.json() : {content:{}}; })
  .then(function(res){ CONTENT = (res && res.content) || {}; show('contact'); $('#save').disabled=false; })
  .catch(function(){ CONTENT = {}; show('contact'); $('#save').disabled=false; });

function escAttr(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

// ---------- render a panel ----------
function show(id){
  current = id; dirty = {}; pendingImages = {}; galPhotos = null; galItems = null;
  document.querySelectorAll('.side__item').forEach(function(b){ b.classList.toggle('active', b.dataset.panel===id); });
  var p = PANELS[id]; if(!p) return;
  $('#ptitle').textContent = p.title; $('#pdesc').textContent = p.desc || '';
  setStatus('');
  var el = $('#panel'); el.className='panel';

  if(p.special==='backup'){ renderBackup(el); return; }
  if(p.special==='payments'){ renderPayments(el); return; }

  var html = '';
  p.fields.forEach(function(f){
    if(f.type==='heading'){ html += '<div class="fhead">'+escAttr(f.label)+'</div>'; return; }
    if(f.type==='subhead'){ html += '<div class="fsub">'+escAttr(f.label)+'</div>'; return; }
    var val = CONTENT[f.key] != null ? CONTENT[f.key] : '';
    html += '<div class="field">';
    html += '<label for="f_'+f.key+'">'+f.label+'</label>';
    if(f.hint) html += '<div class="hint">'+f.hint+'</div>';
    if(f.type==='photos'){
      // seed the working list from the DB value, else the shipped defaults
      var list = null;
      if(typeof val==='string' && val.trim()){ try{ var a=JSON.parse(val); if(Array.isArray(a)) list=a; }catch(e){} }
      if(!list) list = (DEFAULT_PHOTOS[f.gallery] || []).slice();
      galPhotos = { key:f.key, gallery:f.gallery, list:list };
      html += '<div id="pwrap"></div>'
            + '<input type="file" id="pfile" accept="image/*" multiple hidden>';
    } else if(f.type==='items'){
      var ilist = [];
      if(typeof val==='string' && val.trim()){ try{ var ia=JSON.parse(val); if(Array.isArray(ia)) ilist=ia; }catch(e){} }
      ilist = ilist.map(function(it){ return (it && typeof it==='object') ? {url:it.url||'', desc:it.desc||''} : {url:String(it||''), desc:''}; });
      galItems = { key:f.key, list:ilist };
      html += '<div id="iwrap"></div><input type="file" id="ifile" accept="image/*" multiple hidden>';
    } else if(f.type==='textarea'){
      html += '<textarea id="f_'+f.key+'" data-key="'+f.key+'" placeholder="'+escAttr(f.ph||'')+'">'+escAttr(val)+'</textarea>';
    } else if(f.type==='image'){
      var cur = val || f.def || '';
      html += '<div class="imgrow"><div class="prev" id="prev_'+f.media+'">'+(cur?'<img src="'+escAttr(cur)+'?cb='+Date.now()+'">':'No image')+'</div>'
            + '<div><input class="file" type="file" accept="image/*" data-media="'+f.media+'" data-key="'+f.key+'"><div class="hint" style="margin-top:8px;">JPG/PNG. Auto-resized on upload.</div></div></div>';
    } else {
      html += '<input id="f_'+f.key+'" data-key="'+f.key+'" type="'+(f.type||'text')+'" value="'+escAttr(val)+'" placeholder="'+escAttr(f.ph||'')+'">';
    }
    html += '</div>';
  });
  el.innerHTML = html;

  el.querySelectorAll('[data-key]').forEach(function(inp){
    if(inp.type==='file'){
      inp.addEventListener('change', function(){
        var file = inp.files[0]; if(!file) return;
        readImage(file, 1400, function(dataUrl){
          pendingImages[inp.dataset.media] = { dataUrl:dataUrl, key:inp.dataset.key };
          var prev = $('#prev_'+inp.dataset.media); if(prev) prev.innerHTML = '<img src="'+dataUrl+'">';
          markDirty();
        });
      });
    } else {
      inp.addEventListener('input', function(){ dirty[inp.dataset.key] = inp.value; markDirty(); });
    }
  });

  if(galPhotos) initPhotoField();
  if(galItems) initItemsField();
}

// ---------- item manager (photo + description per item) ----------
function initItemsField(){
  renderItemsGrid();
  var file = $('#ifile');
  file.addEventListener('change', function(){
    var files = Array.prototype.slice.call(file.files || []);
    file.value = '';
    if(!files.length) return;
    setStatus('Adding item'+(files.length>1?'s':'')+'…');
    (function nextFile(i){
      if(i >= files.length){ setStatus('Item'+(files.length>1?'s':'')+' added - add descriptions, then Save'); return; }
      readImage(files[i], 1400, function(dataUrl){
        var mk = 'fit-' + Math.random().toString(36).slice(2,10);
        fetch('/api/media/'+mk, { method:'PUT', headers:{'content-type':'application/json'}, body:JSON.stringify({ photo:dataUrl }) })
          .then(function(r){ return r.json(); })
          .then(function(res){ if(res && res.url){ galItems.list.push({url:res.url, desc:''}); renderItemsGrid(); markDirty(); } })
          .catch(function(){ setStatus('Upload failed - check your connection','err'); })
          .then(function(){ nextFile(i+1); });
      });
    })(0);
  });
}

function renderItemsGrid(){
  var wrap = $('#iwrap'); if(!wrap || !galItems) return;
  var html = '';
  if(!galItems.list.length){ html += '<div class="iempty">No items yet - add the first one below.</div>'; }
  html += '<div class="igrid">';
  galItems.list.forEach(function(it, i){
    html += '<div class="icell">'
      + '<div class="ithumb"><img src="'+escAttr(it.url)+'" alt=""><button class="del" type="button" data-i="'+i+'" title="Remove">&times;</button></div>'
      + '<textarea data-i="'+i+'" placeholder="Describe this piece…">'+escAttr(it.desc||'')+'</textarea>'
      + '</div>';
  });
  html += '<button type="button" class="iadd" id="iaddbtn">+ Add items</button>';
  html += '</div>';
  wrap.innerHTML = html;
  wrap.querySelector('#iaddbtn').addEventListener('click', function(){ $('#ifile').click(); });
  wrap.querySelectorAll('.icell .del').forEach(function(b){
    b.addEventListener('click', function(){ galItems.list.splice(parseInt(b.dataset.i,10),1); renderItemsGrid(); markDirty(); });
  });
  wrap.querySelectorAll('.icell textarea').forEach(function(t){
    t.addEventListener('input', function(){ var idx=parseInt(t.dataset.i,10); if(galItems.list[idx]) galItems.list[idx].desc = t.value; markDirty(); });
  });
}

// ---------- gallery photo manager ----------
function initPhotoField(){
  renderPhotoGrid();
  var file = $('#pfile');
  file.addEventListener('change', function(){
    var files = Array.prototype.slice.call(file.files || []);
    file.value = '';
    if(!files.length) return;
    setStatus('Adding photo'+(files.length>1?'s':'')+'…');
    // upload each, in order, appending as they land
    (function nextFile(i){
      if(i >= files.length){ setStatus('Photo'+(files.length>1?'s':'')+' added - Save to publish'); return; }
      readImage(files[i], 1400, function(dataUrl){
        var mk = 'gal-' + galPhotos.gallery + '-' + Math.random().toString(36).slice(2,10);
        fetch('/api/media/'+mk, { method:'PUT', headers:{'content-type':'application/json'}, body:JSON.stringify({ photo:dataUrl }) })
          .then(function(r){ return r.json(); })
          .then(function(res){ if(res && res.url){ galPhotos.list.push(res.url); renderPhotoGrid(); markDirty(); } })
          .catch(function(){ setStatus('Upload failed - check your connection','err'); })
          .then(function(){ nextFile(i+1); });
      });
    })(0);
  });
}

function renderPhotoGrid(){
  var wrap = $('#pwrap'); if(!wrap || !galPhotos) return;
  var html = '';
  if(!galPhotos.list.length){ html += '<div class="pempty">No photos yet - add the first one below.</div>'; }
  html += '<div class="pgrid">';
  galPhotos.list.forEach(function(url, i){
    html += '<div class="pcell">'
      + '<img src="'+escAttr(url)+'" alt="">'
      + '<span class="num'+(i===0?' hero':'')+'">'+(i===0?'Hero':('#'+(i+1)))+'</span>'
      + '<button class="del" type="button" data-i="'+i+'" title="Remove">&times;</button>'
      + '</div>';
  });
  html += '<button type="button" class="padd" id="paddbtn">+ Add photos</button>';
  html += '</div>';
  wrap.innerHTML = html;
  wrap.querySelector('#paddbtn').addEventListener('click', function(){ $('#pfile').click(); });
  wrap.querySelectorAll('.del').forEach(function(b){
    b.addEventListener('click', function(){
      galPhotos.list.splice(parseInt(b.dataset.i,10), 1);
      renderPhotoGrid(); markDirty();
    });
  });
}

function renderPayments(el){
  el.className='panel'; el.innerHTML = '<div class="load">Loading…</div>';
  Promise.all([
    fetch('/api/pay/config',{cache:'no-store'}).then(function(r){return r.json();}).catch(function(){return {enabled:false};}),
    fetch('/api/admin/orders').then(function(r){return r.ok?r.json():{orders:[]};}).catch(function(){return {orders:[]};})
  ]).then(function(res){
    var cfg=res[0]||{}, orders=(res[1]&&res[1].orders)||[];
    var status = cfg.enabled
      ? '<b style="color:#3c7a45;">Payments are ON</b> ('+(cfg.env==='live'?'LIVE':'Sandbox / test mode')+', default currency '+escAttr(cfg.currency||'USD')+').'
      : '<b style="color:#a5382f;">Payments are OFF.</b> Add your PayPal keys (below) to switch on. Nothing is charged until you do.';
    var html = '<div class="note" style="margin-bottom:20px;">'+status+'</div>'
      + '<div class="note" style="margin-bottom:24px;line-height:1.7;"><b>How to switch on</b><br>'
      + '1. Create a <b>PayPal Business</b> account, then in the <b>PayPal Developer</b> dashboard make an app and copy its <b>Client ID</b> and <b>Secret</b>.<br>'
      + '2. In <b>Cloudflare</b> → your Worker → <b>Settings → Variables</b>, add:<br>'
      + '&nbsp;&nbsp;• <code>PAYPAL_CLIENT_ID</code><br>'
      + '&nbsp;&nbsp;• <code>PAYPAL_SECRET</code> &nbsp;(tick <b>Encrypt</b>)<br>'
      + '&nbsp;&nbsp;• <code>PAYPAL_ENV</code> = <code>sandbox</code> to test, <code>live</code> when ready<br>'
      + '&nbsp;&nbsp;• <code>PAYPAL_CURRENCY</code> = <code>USD</code> (or GBP / EUR)<br>'
      + '3. Deploy. The buyer pays at <b><a href="pay.html" target="_blank">/pay</a></b> - you can also send a direct link like <code>/pay?piece=DS-001</code>.<br>'
      + 'The amount is fixed by our server when the order starts, and every payment is verified before it is marked paid.</div>'
      + '<div class="fsub">Recent orders</div>';
    if(!orders.length){ html += '<div class="hint">No orders yet.</div>'; }
    else {
      html += '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">'
        + '<tr style="text-align:left;color:var(--muted);"><th style="padding:7px 8px;">When</th><th style="padding:7px 8px;">Item</th><th style="padding:7px 8px;">Amount</th><th style="padding:7px 8px;">Status</th><th style="padding:7px 8px;">Payer</th></tr>';
      orders.forEach(function(o){
        var when=''; try{ when = new Date(o.created).toLocaleString(); }catch(e){}
        var payer=''; try{ payer=(JSON.parse(o.payer||'{}').email)||''; }catch(e){}
        var col = o.status==='paid' ? '#3c7a45' : (o.status==='created' ? 'var(--muted)' : '#a5382f');
        html += '<tr style="border-top:1px solid var(--border);"><td style="padding:7px 8px;">'+escAttr(when)+'</td><td style="padding:7px 8px;">'+escAttr(o.descr||o.piece_id||'-')+'</td><td style="padding:7px 8px;white-space:nowrap;">'+escAttr((o.currency||'')+' '+(o.amount||''))+'</td><td style="padding:7px 8px;color:'+col+';font-weight:600;">'+escAttr(o.status||'')+'</td><td style="padding:7px 8px;">'+escAttr(payer)+'</td></tr>';
      });
      html += '</table></div>';
    }
    el.innerHTML = html;
  });
}

function renderBackup(el){
  el.innerHTML =
    '<div class="note" style="margin-bottom:22px;"><b>Two safety nets protect your data.</b><br>'
    + '1. <b>Automatic:</b> Cloudflare D1 keeps 30 days of point-in-time history - any change can be rolled back from the Cloudflare dashboard (D1 → your database → Time&nbsp;Travel).<br>'
    + '2. <b>Manual:</b> download a full JSON copy of every art piece, artist and content field below and keep it safe.</div>'
    + '<a class="btn2" id="dl" href="/api/admin/export" download="artpro-backup.json">⬇ Download full backup (JSON)</a>'
    + '<div class="hint" style="margin-top:10px;">Editing site content here never touches your art pieces or artists - it only writes to a separate content table.</div>';
  $('#dl').addEventListener('click', function(e){
    e.preventDefault();
    fetch('/api/admin/export').then(function(r){return r.json();}).then(function(data){
      var blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'artpro-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
      setStatus('Backup downloaded ('+data.counts.pieces+' pieces, '+data.counts.artists+' artists)', 'ok');
    }).catch(function(){ setStatus('Backup failed','err'); });
  });
}

function markDirty(){ setStatus('Unsaved changes'); }
function setStatus(t, cls){ var s=$('#status'); s.textContent=t||''; s.className='status'+(cls?(' '+cls):''); }

// ---------- image downscale ----------
function readImage(file, maxDim, cb){
  var img = new Image();
  img.onload = function(){
    var s = Math.min(1, maxDim/Math.max(img.width, img.height));
    var w = Math.max(1,Math.round(img.width*s)), h = Math.max(1,Math.round(img.height*s));
    var c = document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg', 0.85));
    URL.revokeObjectURL(img.src);
  };
  img.onerror = function(){ setStatus('Could not read that image','err'); };
  img.src = URL.createObjectURL(file);
}

// ---------- save ----------
$('#save').addEventListener('click', function(){
  var btn = this; btn.disabled = true; setStatus('Saving…');
  // fold the gallery photo list into the pending text changes if it changed
  if(galPhotos){
    var serialized = JSON.stringify(galPhotos.list);
    if(serialized !== (CONTENT[galPhotos.key] || '')) dirty[galPhotos.key] = serialized;
  }
  if(galItems){
    var iserialized = JSON.stringify(galItems.list);
    if(iserialized !== (CONTENT[galItems.key] || '')) dirty[galItems.key] = iserialized;
  }
  var mediaKeys = Object.keys(pendingImages);
  // 1) upload any new images, collecting their URLs into `dirty`
  Promise.all(mediaKeys.map(function(mk){
    return fetch('/api/media/'+mk, { method:'PUT', headers:{'content-type':'application/json'}, body:JSON.stringify({ photo: pendingImages[mk].dataUrl }) })
      .then(function(r){ return r.json(); })
      .then(function(res){ if(res && res.url){ dirty[pendingImages[mk].key] = res.url; } });
  })).then(function(){
    // 2) save the content keys
    if(!Object.keys(dirty).length){ btn.disabled=false; setStatus('Nothing to save'); return; }
    return fetch('/api/content', { method:'PUT', headers:{'content-type':'application/json'}, body:JSON.stringify({ content: dirty }) })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if(res && res.ok){ Object.assign(CONTENT, dirty); pendingImages={}; setStatus('Saved ✓','ok'); }
        else setStatus((res && res.error) || 'Save failed','err');
        btn.disabled=false;
      });
  }).catch(function(){ setStatus('Save failed - check your connection','err'); btn.disabled=false; });
});
