# Cloudflare Worker — serves the static ./public site AND a small JSON API
# backed by a D1 database. wordpress-plugin/ and the repo-root notes are NOT
# published (only ./public is served).
name = "artpro-gallery"
main = "worker/index.js"
compatibility_date = "2026-07-01"

# Static site. `binding = "ASSETS"` lets the Worker fall through to the files
# for any non-/api request (see worker/index.js).
[assets]
directory = "./public"
binding = "ASSETS"

# D1 database. Create it with:  npx wrangler d1 create artpro-catalog
# then paste the printed database_id below (replacing REPLACE_WITH_DATABASE_ID).
[[d1_databases]]
binding = "DB"
database_name = "artpro-catalog"
database_id = "ff37ee77-4d49-4ac1-b968-26af46b311d3"
